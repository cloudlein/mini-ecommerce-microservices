spring:
  application:
    name: user service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/emr-app}
    username: ${DB_USERNAME:asdf}
    password: ${DB_PASSWORD:asdf}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-in-ms: ${JWT_EXPIRATION_IN_MS}
