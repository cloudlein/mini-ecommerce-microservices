spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:user-service-test-db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

security:
  jwt:
    secret: dGVzdF9qd3Rfc2VjcmV0X2Zvcl90ZXN0X3Byb2plY3Q=
    expiration-in-ms: 3600000
  argon2:
    salt-length: 16
    hash-length: 32
    parallelism: 1
    memory: 16384
    iterations: 2

jwt:
  secret: dGVzdF9qd3Rfc2VjcmV0X2Zvcl90ZXN0X3Byb2plY3Q=
  expiration:
    ms: 3600000
