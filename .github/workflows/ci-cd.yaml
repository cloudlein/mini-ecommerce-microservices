name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME: ${{ github.repository }}

jobs:
  test-java-services:
    name: Test Java Services (User, Order)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ "user-service", "order-service" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./${{ matrix.service }}/gradlew
      
    - name: Build and Test with Gradle
      working-directory: ./${{ matrix.service }}
      run: ./gradlew build

  test-golang-services:
    name: Test Golang Services (Product, Payment)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ "product-service", "payment-service" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache-dependency-path: ./${{ matrix.service }}/go.sum

    - name: Build
      working-directory: ./${{ matrix.service }}
      run: go build -v ./...

    - name: Test
      working-directory: ./${{ matrix.service }}
      run: go test -v ./...

  build-and-push-images:
    name: Build and Push Docker Images
    needs: [test-java-services, test-golang-services]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [ "user-service", "order-service", "product-service", "payment-service", "api-gateway" ]
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}