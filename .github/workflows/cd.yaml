name: Continuous Delivery (CD)

on:
  push:
    branches: [ "main" ]
  workflow_run:
    workflows: ["Continuous Integration (CI)"]
    types:
      - completed

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-images:
    name: Build and Push Docker Images
    # Only run CD if it's a push to main OR if triggered by a successful CI run
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ "user-service", "discovery-client", "gateway", "config-server", "product-service", "order-service", "payment-service" ]
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to the Container registry
      if: ${{ matrix.service == 'user-service' || matrix.service == 'discovery-client' || matrix.service == 'gateway' || matrix.service == 'config-server' }}
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      if: ${{ matrix.service == 'user-service' || matrix.service == 'discovery-client' || matrix.service == 'gateway' || matrix.service == 'config-server' }}
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      if: ${{ matrix.service == 'user-service' || matrix.service == 'discovery-client' || matrix.service == 'gateway' || matrix.service == 'config-server' }}
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
