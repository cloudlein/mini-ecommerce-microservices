name: "OWASP Dependency Check"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday

jobs:
  dependency-check-java:
    name: OWASP Dependency Check (Java services)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          # reset JAVA_HOME to match JDK inside dependency-check Docker image
          JAVA_HOME: /opt/jdk
        with:
          project: "mini-ecommerce-microservices-java"
          path: "user-service"
          format: "HTML"
          out: "reports"
          args: >
            --enableExperimental

      - name: Upload dependency-check report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-java
          path: reports
