name: "Container and Dependency Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 4 * * 1' # Weekly on Monday

jobs:
  trivy-file-system:
    name: Trivy FS Scan (source + dependencies)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy (Filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        env:
          TRIVY_DISABLE_VEX_NOTICE: true

  trivy-images:
    name: Trivy Image Scan (built Docker images)
    runs-on: ubuntu-latest
    needs: trivy-file-system
    strategy:
      matrix:
        service: [ "user-service", "gateway", "discovery-client", "config-server", "product-service" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t test-${{ matrix.service }} ./${{ matrix.service }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'test-${{ matrix.service }}'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        env:
          TRIVY_DISABLE_VEX_NOTICE: true
