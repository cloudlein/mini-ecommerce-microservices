services:
  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Caching and Stock Reservation
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Broker for Saga Pattern (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecom-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"   # AMQP
      - "${RABBITMQ_UI_PORT:-15672}:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    networks:
      - ecom-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ecom-network:
    driver: bridge

volumes:
  postgres_data:
